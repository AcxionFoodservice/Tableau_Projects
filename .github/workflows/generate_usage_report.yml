name: Generate Tableau Usage Report

on:
  workflow_dispatch:
    inputs:
      output_filename:
        description: "Output filename (without .xlsx extension)"
        required: false
        default: ""

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r "Tableau Inventory/Usage/requirements.txt"

      - name: Set output filename
        id: filename
        run: |
          if [ -n "${{ github.event.inputs.output_filename }}" ]; then
            echo "name=${{ github.event.inputs.output_filename }}.xlsx" >> $GITHUB_OUTPUT
          else
            echo "name=tableau_usage_report_$(date +%Y-%m-%d).xlsx" >> $GITHUB_OUTPUT
          fi

      - name: Generate report
        env:
          TABLEAU_PAT_NAME: ${{ secrets.TABLEAU_PAT_NAME }}
          TABLEAU_PAT_SECRET: ${{ secrets.TABLEAU_PAT_SECRET }}
        run: |
          python "Tableau Inventory/Usage/scripts/generate_usage_report.py" --output "${{ steps.filename.outputs.name }}"

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tableau-usage-report
          path: ${{ steps.filename.outputs.name }}
          retention-days: 30
